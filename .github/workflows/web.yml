name: web
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ./web

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Lint
        run: pnpm run lint
      - name: Format check
        run: oxfmt --check src
